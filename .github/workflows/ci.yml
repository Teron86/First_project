name: CI Check

on:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Verify site files
        run: |
          if [ -f "index.html" ]; then
            echo "index.html found!"
          else
            echo "index.html not found!"
            exit 1
          fi
